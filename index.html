<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanta.js Effects</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #000;
        color: #fff;
        text-align: center;
        font-family: unset;
      }

      header {
        padding: 20px;
        background: #dee2e6;
        position: fixed;
        width: 100%;
        top: 0;
        z-index: 10;
      }

      h1 {
        margin-bottom: 15px;
        font-size: 28px;
        color: #000;
      }

      .effect-menu {
        display: flex;
        justify-content: center;
        gap: 25px;
        flex-wrap: wrap;
      }

      .effect-btn {
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        color: #000;
        transition: 0.3s;
        position: relative;
      }

      .effect-btn:hover {
        color: #0077ff;
      }

      .effect-btn.active {
        color: #0077ff;
      }

      .main {
        height: 100vh;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Vanta.js Animation Library</h1>
      <div class="effect-menu">
        <span class="effect-btn active" data-effect="CLOUDS">Clouds</span>
        <span class="effect-btn" data-effect="BIRDS">Birds</span>
        <span class="effect-btn" data-effect="GLOBE">Globe</span>
        <span class="effect-btn" data-effect="TOPOLOGY">Topology</span>
        <span class="effect-btn" data-effect="DOTS">Dots</span>
        <span class="effect-btn" data-effect="RINGS">Rings</span>
        <span class="effect-btn" data-effect="HALO">Halo</span>
      </div>
    </header>

    <div class="main" id="background"></div>

    <!-- Required Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.globe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.topology.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.rings.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.halo.min.js"></script>

    <script>
      let vantaEffect;

      function loadEffect(effectName) {
        if (vantaEffect) vantaEffect.destroy();

        vantaEffect = VANTA[effectName]({
          el: "#background",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 200.0,
          minWidth: 200.0,
          scale: 1.0,
          scaleMobile: 1.0,
        });
      }

      document.querySelectorAll(".effect-btn").forEach((btn) => {
        btn.addEventListener("click", function () {
          document
            .querySelectorAll(".effect-btn")
            .forEach((b) => b.classList.remove("active"));

          this.classList.add("active");

          loadEffect(this.dataset.effect);
        });
      });

      // default load
      loadEffect("CLOUDS");
    </script>
  </body>
</html>
